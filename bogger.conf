# BOGGER Runner Configuration
BOGGER_VERSION=0.2.0

# Windows disk backing device path
# Bare metal:  /dev/nvme1n1  (the whole Windows NVMe drive)
# QEMU debug:  /dev/nvme0n1  (same NVMe passed through via VFIO, appears
#              as the only NVMe inside QEMU → nvme0n1)
# The kernel cmdline param bogger_disk= overrides this value.
# Auto-detect order if empty: nvme1n1 → nvme0n1 → vda → sda
BOGGER_DISK_PATH=/dev/nvme1n1

# Windows EFI Boot Manager target (auto-detected if empty)
# On ESP: EFI/Microsoft/Boot/bootmgfw.efi
# NOTE: winload.efi is on the NTFS Windows partition, NOT on the ESP
BOGGER_EFI_PATH=

# Silent mode (0=normal console output, 1=errors only)
BOGGER_SILENT=0

# Stealth features (1=enabled, 0=disabled)
# These hide the hypervisor from the guest OS (Windows)
BOGGER_STEALTH_CPUID=1    # Clear CPUID hypervisor-present bit
BOGGER_STEALTH_MSR=1      # Intercept VMX/SVM capability MSRs
BOGGER_STEALTH_TSC=1      # Native TSC passthrough (no RDTSC exit)
BOGGER_STEALTH_ACPI=1     # Pass through real ACPI tables
BOGGER_STEALTH_IOMMU=1    # Identity-map DMA for passthrough

# Guest RAM size in MB (0=auto: use 50% of available RAM, min 128 MB)
# On real hardware with 16+ GB RAM, set to 8192 for best Windows 11 performance
# In QEMU test VMs, leave at 0 for auto-detection
BOGGER_GUEST_RAM_MB=8192

# GPU PCI Passthrough
# Bare metal: real GPU at 0a:00.0 (NVIDIA RTX 5070 [10de:2f04])
# QEMU:       QXL at 00:06.0 (auto-detected via bogger_gpu=1 cmdline)
# Set to 1 and provide the BDF of your GPU for direct display output.
# The GPU will be unbound from its host driver (amdgpu/nvidia) and
# passed directly to Windows — you see the Windows desktop on your monitor.
# Find your GPU BDF with: lspci | grep VGA
BOGGER_PASSTHROUGH_GPU=1
BOGGER_GPU_BDF=0a:00.0

# VMCS Configuration
BOGGER_VMX_PREEMPTION_TIMER=0
BOGGER_TSC_OFFSET_ENABLED=1

# Logging (0=silent, 1=errors only, 2=verbose)
BOGGER_LOG_LEVEL=2

# Shared memory IPC size in pages (4KB each)
BOGGER_IPC_PAGES=4
